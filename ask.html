<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask ArafTheAI</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#050816;
    color:white;
    margin:0;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    padding:20px;
    font-size:28px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 2px 20px rgba(0,217,255,.15);
}

#chatBox{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:80%;
    padding:15px;
    margin:12px 0;
    border-radius:18px;
}

.user{
    background:#00d9ff;
    color:black;
    margin-left:auto;
}

.ai{
    background:rgba(255,255,255,.08);
    color:white;
}

.inputArea{
    display:flex;
    padding:15px;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:30px;
    font-size:16px;
}

button{
    width:120px;
    border:none;
    border-radius:30px;
    background:#00d9ff;
    font-weight:bold;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="background"></div>

<div class="header">
🤖 ArafTheAI
</div>

<div id="chatBox">

<div class="message ai">
Hello! I'm ArafTheAI.
Ask me anything.
</div>

</div>

<div class="inputArea">

<input
id="question"
placeholder="Ask anything...">

<button onclick="sendMessage()">
Send
</button>

</div>

<script>

function sendMessage(){

let input=document.getElementById("question");

let text=input.value.trim();

if(text=="") return;

let chat=document.getElementById("chatBox");

chat.innerHTML+=`
<div class="message user">
${text}
</div>
`;

chat.innerHTML+=`
<div class="message ai">
Searching knowledge...
</div>
`;

chat.scrollTop=chat.scrollHeight;

input.value="";

}

</script>

</body>
</html>

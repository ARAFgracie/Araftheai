<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal AI Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <h2>🤖 My AI Assistant</h2>
      <p>Ask me anything!</p>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="message ai-message">
        হ্যালো! আমি আপনার AI অ্যাসিস্ট্যান্ট। আমাকে যেকোনো প্রশ্ন করতে পারেন!
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="আপনার প্রশ্নটি লিখুন..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

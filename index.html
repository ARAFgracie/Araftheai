<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Interactive Web Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">My<span>Website</span></div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <header id="home" class="hero">
    <h1>Welcome to My Digital Space</h1>
    <p>Built with HTML, CSS, and JS — Ready for GitHub Deployment!</p>
    <button id="cta-btn" onclick="showMessage()">Click Me</button>
  </header>

  <!-- Interactive Counter Section -->
  <section id="about" class="interactive-section">
    <h2>Interactive Counter</h2>
    <div class="counter-box">
      <button onclick="decrement()">-</button>
      <span id="counter">0</span>
      <button onclick="increment()">+</button>
    </div>
  </section>

  <!-- Footer -->
  <footer id="contact">
    <p>&copy; 2026 Designed and Hosted on GitHub Pages</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
